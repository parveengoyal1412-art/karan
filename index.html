<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARAN Dashboard</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: #0f172a;
        color: #fff;
        display: flex;
    }

    .sidebar {
        width: 220px;
        height: 100vh;
        background: #020617;
        padding: 20px;
    }

    .sidebar h2 {
        color: #38bdf8;
        margin-bottom: 30px;
    }

    .sidebar a {
        display: block;
        color: #cbd5f5;
        text-decoration: none;
        margin: 15px 0;
        padding: 10px;
        border-radius: 8px;
        transition: 0.3s;
    }

    .sidebar a:hover {
        background: #1e293b;
    }

    .main {
        flex: 1;
        padding: 20px;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .header h1 {
        color: #38bdf8;
    }

    .card-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .card {
        background: #1e293b;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    button {
        margin-top: 10px;
        padding: 10px 15px;
        border: none;
        background: #38bdf8;
        color: black;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0ea5e9;
    }

    .chat-box {
        margin-top: 20px;
        background: #1e293b;
        padding: 20px;
        border-radius: 15px;
    }

    .chat-box input {
        width: 80%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    .chat-box button {
        width: 18%;
    }
</style>

</head>

<body>

<div class="sidebar">
    <h2>KARAN</h2>
    <a href="#">Dashboard</a>
    <a href="#">Voice Control</a>
    <a href="#">Deployments</a>
    <a href="#">Settings</a>
</div>

<div class="main">

    <div class="header">
        <h1>KARAN Control Panel</h1>
        <p>Status: 🟢 Online</p>
    </div>

    <div class="card-container">

        <div class="card">
            <h3>🎤 Voice Assistant</h3>
            <p>Control KARAN using voice commands.</p>
            <button onclick="alert('Listening...')">Start Listening</button>
        </div>

        <div class="card">
            <h3>⚙ Deployment Engine</h3>
            <p>Manage deployments from dashboard.</p>
            <button onclick="alert('Deploying...')">Deploy</button>
        </div>

        <div class="card">
            <h3>💻 System Status</h3>
            <p>Check system health and logs.</p>
            <button onclick="alert('Fetching Status...')">Check</button>
        </div>

    </div>

    <div class="chat-box">
        <h3>💬 Chat with KARAN</h3>
        <br>
        <input type="text" placeholder="Type your command...">
        <button onclick="alert('Command Sent!')">Send</button>
    </div>

</div>

</body>
</html>
